<style>
  /* ============================================================
     FELLES GRUNNMUR — STIL
     6 temaer (Deep space, Midnight, Dusk, Slate, Sepia, Daylight)
     + dysleksifont (data-font="dys") + kontrast (data-contrast="on").
     Arves likt av alle apper.
  ============================================================ */
  :root{
    --appfont:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    --accent:#1de9a6; --accent-ink:#06321f;
    --bg:#070d1c; --bg2:#0c1428; --card:#101a30; --card2:#15233f;
    --line:#213152; --line2:#2c3d63;
    --txt:#eaf2ff; --txt-2:#9fb2d8; --txt-3:#6b7da3;
    --radius:14px; --maxw:760px;
  }
  html[data-theme="midnight"]{
    --accent:#9d8cff; --accent-ink:#1a1340;
    --bg:#06060f; --bg2:#0c0c1a; --card:#13132a; --card2:#1b1b3a;
    --line:#262648; --line2:#34345e; --txt:#ece9ff; --txt-2:#a9a4cf; --txt-3:#726d9a;
  }
  html[data-theme="dusk"]{
    --accent:#ff8a7a; --accent-ink:#3d1410;
    --bg:#140a14; --bg2:#1d0f1d; --card:#271528; --card2:#341c35;
    --line:#3d2440; --line2:#522f55; --txt:#f6e9f3; --txt-2:#c9a9c4; --txt-3:#8f6f8c;
  }
  html[data-theme="slate"]{
    --accent:#5aa0f0; --accent-ink:#0a2440;
    --bg:#0f141a; --bg2:#161d26; --card:#1c2530; --card2:#26313e;
    --line:#313d4a; --line2:#42505f; --txt:#e8edf3; --txt-2:#a6b3c2; --txt-3:#6f7d8c;
  }
  html[data-theme="sepia"]{
    --accent:#b5743a; --accent-ink:#fff7ec;
    --bg:#f3e9d8; --bg2:#ece0cb; --card:#fbf4e7; --card2:#f5ebd8;
    --line:#d8c7a8; --line2:#c8b48f; --txt:#3a2f1f; --txt-2:#6f5e44; --txt-3:#9a876a;
  }
  html[data-theme="daylight"]{
    --accent:#2f7fe0; --accent-ink:#ffffff;
    --bg:#f6f8fb; --bg2:#eef1f6; --card:#ffffff; --card2:#f3f6fa;
    --line:#dde3ec; --line2:#c7d0dd; --txt:#1a2230; --txt-2:#566175; --txt-3:#8a94a5;
  }
  html[data-contrast="on"]{
    --accent:#ffd400; --accent-ink:#000000;
    --bg:#000; --bg2:#000; --card:#000; --card2:#0a0a0a;
    --line:#fff; --line2:#fff; --txt:#fff; --txt-2:#fff; --txt-3:#e6e6e6; --radius:8px;
  }
  html[data-font="dys"]{ --appfont:'Atkinson Hyperlegible',-apple-system,system-ui,sans-serif; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    margin:0; background:var(--bg); color:var(--txt);
    font-family:var(--appfont);
    min-height:100vh; overflow-x:hidden;
  }

  #esbBg::after{
    content:""; position:absolute; inset:0;
    background:linear-gradient(180deg,
      rgba(8,12,26,.86) 0%,
      rgba(8,12,26,.46) 28%,
      rgba(8,12,26,.46) 60%,
      rgba(8,12,26,.95) 100%);
  }
  /* Vis bildet kun i Deep space (standardtemaet) */
  html:not([data-theme="deepspace"]) #esbBg{ display:none; }

  .wrap{position:relative;z-index:1;max-width:var(--maxw);margin:0 auto;padding:14px 16px 40px}


  /* topplinje */
  header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:18px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px}
  .logo{width:46px;height:46px;border-radius:50%;background:transparent;display:flex;align-items:center;justify-content:center;overflow:hidden;flex:0 0 auto}
  .logo img{width:100%;height:100%;object-fit:contain;display:block}
  .brand h1{font-size:17px;margin:0;line-height:1.1;font-weight:600}
  .brand p{font-size:11px;margin:0;color:var(--txt-3);letter-spacing:.12em;text-transform:uppercase}
  .controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .seg button{background:transparent;border:0;color:var(--txt-2);font:inherit;font-size:13px;padding:7px 13px;cursor:pointer}
  .seg button[aria-pressed="true"]{background:var(--accent);color:var(--accent-ink);font-weight:600}
  .iconbtn{width:38px;height:38px;border-radius:999px;background:var(--card);border:1px solid var(--line);color:var(--txt-2);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}

  /* turbar */
  .tripbar{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:10px 12px;margin-bottom:18px}
  .tripbar .ico{width:34px;height:34px;border-radius:9px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:18px}
  .tripbar .t1{font-size:14px;font-weight:600;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tripbar .t2{font-size:12px;color:var(--txt-3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tripbar button{flex:0 0 auto;background:transparent;border:1px solid var(--line2);color:var(--txt-2);border-radius:999px;padding:6px 12px;font:inherit;font-size:12px;cursor:pointer}

  /* carousel */
  .stage{text-align:center;margin:6px 0 4px}
  .stage h2{font-size:26px;margin:0 0 4px;font-weight:700}
  .stage p{font-size:13px;color:var(--txt-2);margin:0 0 18px}
  .carousel{position:relative;display:flex;align-items:center;justify-content:center;gap:12px;min-height:160px;touch-action:pan-y}
  .coin{flex:0 0 auto;border-radius:50%;background:var(--card);border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .28s cubic-bezier(.4,0,.2,1);color:var(--txt-3)}
  .coin .emoji{font-size:24px;filter:grayscale(.4);opacity:.7}
  .coin.far{width:42px;height:42px;opacity:.35}
  .coin.near{width:60px;height:60px}
  .coin.near .emoji{font-size:26px}
  .coin.active{width:96px;height:96px;background:var(--card2);border:2px solid var(--accent);box-shadow:0 0 0 6px color-mix(in srgb,var(--accent) 14%,transparent);color:var(--txt)}
  .coin.active .emoji{font-size:42px;filter:none;opacity:1}
  .arrow{position:absolute;top:50%;transform:translateY(-50%);width:42px;height:42px;border-radius:50%;background:var(--card);border:1px solid var(--line);color:var(--txt-2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2}
  .arrow.prev{left:0} .arrow.next{right:0}
  .label{text-align:center;margin:16px 0 6px}
  .label h3{font-size:20px;margin:0;font-weight:600}
  .label p{font-size:13px;color:var(--txt-2);margin:4px 0 0}
  .dots{display:flex;gap:7px;justify-content:center;margin:14px 0}
  .dots i{width:7px;height:7px;border-radius:50%;background:var(--line2);cursor:pointer}
  .dots i.on{background:var(--accent);width:20px;border-radius:4px}
  .open-btn{display:block;width:100%;max-width:340px;margin:8px auto 0;background:var(--accent);color:var(--accent-ink);border:0;border-radius:999px;padding:15px;font:inherit;font-size:16px;font-weight:700;cursor:pointer}

  /* kameratest + footer-info */
  .pretest{display:flex;gap:8px;justify-content:center;margin:18px 0 0;flex-wrap:wrap}
  .pretest button{background:var(--card);border:1px solid var(--line);color:var(--txt-2);border-radius:999px;padding:9px 14px;font:inherit;font-size:13px;cursor:pointer}

  /* mynt-detalj (mapper) */
  .detail{display:none}
  .detail.show{display:block;padding-bottom:96px}
  .stage.hide,.carousel.hide,.label.hide,.dots.hide,.open-btn.hide,.pretest.hide{display:none}
  .back{background:var(--card2);border:2px solid var(--accent);color:var(--txt);font:inherit;font-size:16px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;padding:12px 20px 12px 16px;border-radius:999px;margin-bottom:14px;min-height:48px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
  .back::before{content:"←";font-size:22px;font-weight:700;color:var(--accent);line-height:1}
  /* Flytende returknapp — KUN hoved-retur (#detail > .back = closeCoin). Tommel-sone nede til høyre. */
  #detail > .back{position:fixed;right:max(16px,env(safe-area-inset-right));bottom:max(20px,env(safe-area-inset-bottom));z-index:80;width:62px;height:62px;padding:0;margin:0;border-radius:50%;display:grid;place-items:center;box-shadow:0 6px 22px rgba(0,0,0,.45);transition:transform .12s ease,box-shadow .12s ease}
  #detail > .back:hover{transform:translateY(-2px);box-shadow:0 9px 28px rgba(0,0,0,.5)}
  #detail > .back > span{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  #detail > .back::before{font-size:27px;margin:0}
  .back:active{transform:scale(.97)}
  .back:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
  html[data-contrast="on"] .back{background:#000;border-color:#ffd400;color:#fff}
  .dhead{text-align:center;margin:6px 0 16px}
  .dhead .emoji{font-size:40px}
  .dhead h3{font-size:22px;margin:6px 0 2px;font-weight:600}
  .dhead p{font-size:13px;color:var(--txt-2);margin:0}
  .folder{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px;margin-bottom:9px}
  .folder.flag{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,var(--card))}
  .folder .femoji{font-size:19px;width:24px;text-align:center}
  .folder .fname{flex:1;font-size:15px;background:transparent;border:0;color:var(--txt);font:inherit;outline:none;border-bottom:1px solid transparent;padding:2px 0}
  .folder .fname:focus{border-bottom:1px solid var(--accent)}
  .folder .fsub{font-size:11px;color:var(--txt-3);display:block;margin-top:2px}
  .badge{font-size:10px;color:var(--accent-ink);background:var(--accent);padding:2px 8px;border-radius:999px;font-weight:600}
  .folder .pen,.folder .del{background:transparent;border:0;color:var(--txt-3);font-size:15px;cursor:pointer;padding:4px}
  .addfolder{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:transparent;border:1px dashed var(--line2);border-radius:var(--radius);padding:12px;color:var(--accent);font:inherit;font-size:14px;cursor:pointer}

  /* klikkbare mapper + topp-/turvisning */
  .folder{cursor:pointer}
  .folder .fname2{font-size:15px;color:var(--txt)}
  .folder .chev{color:var(--txt-3);font-size:18px;margin-left:2px}
  .fcount{font-size:12px;color:var(--txt-3);white-space:nowrap}
  .vtitle{display:flex;align-items:center;gap:10px;margin:4px 0 14px}
  .vtitle .e{font-size:30px}
  .vtitle h3{font-size:21px;margin:0;font-weight:600;flex:1}
  .vtitle .sub{font-size:12px;color:var(--txt-2);margin:2px 0 0}
  .addbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:transparent;border:1px dashed var(--line2);border-radius:var(--radius);padding:13px;color:var(--accent);font:inherit;font-size:14px;cursor:pointer;margin-top:4px}
  .peakcard{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:9px;cursor:pointer}
  .peakcard .pemoji{font-size:26px}
  .peakcard .pn{font-size:16px;font-weight:600}
  .peakcard .pe{font-size:12px;color:var(--txt-3);margin-top:1px}
  .peakcard .cnt{margin-left:auto;font-size:13px;color:var(--accent);font-weight:600;white-space:nowrap}
  .turcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:13px;margin-bottom:11px}
  .turcard .th{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
  .turcard .tlabel{font-size:14px;font-weight:600;color:var(--accent)}
  .fld{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:10px;color:var(--txt);font:inherit;font-size:14px;padding:10px;outline:none;margin-bottom:8px}
  .fld:focus{border-color:var(--accent)}
  textarea.fld{min-height:130px;resize:vertical;overflow:hidden;line-height:1.5}
  /* utskrift / PDF-rapport */
  #printArea{display:none}
  @media print{
    body > *:not(#printArea){display:none !important}
    #printArea{display:block !important}
  }
  .preport{color:#000;font-family:-apple-system,system-ui,sans-serif;padding:6px}
  .preport h1{font-size:24px;margin:0 0 2px}
  .preport .psub{color:#444;font-size:12px;margin-bottom:14px;border-bottom:1px solid #ccc;padding-bottom:8px}
  .preport .pnote{white-space:pre-wrap;font-size:15px;line-height:1.55;margin-bottom:16px}
  .preport .pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .preport figure{margin:0;break-inside:avoid}
  .preport figure img{width:100%;border:1px solid #ccc;border-radius:6px;display:block}
  .preport figcaption{font-size:10px;color:#444;margin-top:2px}
  .preport .vbox{border:1px dashed #aaa;border-radius:6px;padding:14px 8px;font-size:12px;color:#444;text-align:center}
  .mediagrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:8px;margin:4px 0 8px}
  .thumb{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;border:1px solid var(--line);background:#000;cursor:pointer}
  .thumb img,.thumb video{width:100%;height:100%;object-fit:cover;display:block}
  .thumb .x{position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:0;font-size:14px;line-height:1;cursor:pointer}
  .thumb .ren{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:0;font-size:11px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .thumb .thumbcap{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(0deg,rgba(0,0,0,.78),transparent);color:#fff;font-size:10px;padding:12px 5px 4px;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:none}
  .cam-zoom{position:absolute;left:0;right:0;bottom:104px;display:flex;align-items:center;justify-content:center;gap:10px;padding:0 28px}
  .cam-zoom input[type=range]{flex:1;max-width:300px;accent-color:#fff}
  .cam-zoom .zlabel{color:#fff;background:rgba(0,0,0,.45);padding:4px 9px;border-radius:999px;font-size:12px;min-width:42px;text-align:center;font-variant-numeric:tabular-nums}
  .addmedia{display:flex;align-items:center;justify-content:center;gap:7px;background:var(--card2);border:1px dashed var(--line2);color:var(--txt-2);border-radius:10px;padding:10px;font:inherit;font-size:13px;cursor:pointer;width:100%}
  .tinybtn{background:transparent;border:0;color:var(--txt-3);font-size:15px;cursor:pointer;padding:2px 4px}

  /* fullskjerm-fremviser */
  .viewer{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.94);display:none;align-items:center;justify-content:center;touch-action:pan-y}
  .viewer.show{display:flex}
  .vstage{max-width:96vw;max-height:86vh;display:flex;align-items:center;justify-content:center}
  .vstage img,.vstage video{max-width:96vw;max-height:86vh;border-radius:8px;display:block}
  .vclose{position:absolute;top:14px;right:16px;width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.14);color:#fff;border:0;font-size:20px;cursor:pointer;z-index:2}
  .vnav{position:absolute;top:50%;transform:translateY(-50%);width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.14);color:#fff;border:0;font-size:28px;line-height:1;cursor:pointer;z-index:2}
  .vprev{left:12px} .vnext{right:12px}
  .vcount{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);color:#fff;font-size:13px;background:rgba(0,0,0,.45);padding:5px 13px;border-radius:999px}

  /* snarvei-lenker */
  .linkrow{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px;margin-bottom:9px}
  .linkrow .lk{flex:1;display:flex;align-items:center;gap:11px;color:var(--txt);text-decoration:none;min-width:0}
  .linkrow .lkemoji{font-size:20px}
  .linkrow .lklabel{font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .linkrow .ext{color:var(--txt-3);font-size:15px}

  /* AI-boks (AI overalt) */
  .ai{margin-top:18px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px}
  .ai .row{display:flex;gap:8px}
  .ai input{flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:10px;color:var(--txt);font:inherit;font-size:14px;padding:11px 12px;outline:none}
  .ai input:focus{border-color:var(--accent)}
  .ai .send{background:var(--accent);color:var(--accent-ink);border:0;border-radius:10px;padding:0 16px;font:inherit;font-weight:600;cursor:pointer}
  .ai .hint{font-size:11px;color:var(--txt-3);margin:8px 2px 0}
  .ai .answer{margin-top:10px;font-size:14px;line-height:1.55;color:var(--txt);white-space:pre-wrap;display:none}
  .ai .answer.show{display:block}

  /* auth-stripe */
  .authbar{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--txt-3);justify-content:center;margin-top:26px}
  .authbar button{background:transparent;border:1px solid var(--line);color:var(--txt-2);border-radius:999px;padding:5px 12px;font:inherit;font-size:12px;cursor:pointer}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
  .hsel{background:var(--card);border:1px solid var(--line);color:var(--txt);font:inherit;font-size:13px;padding:8px 10px;border-radius:999px;cursor:pointer;max-width:150px}
  .iconbtn[aria-pressed="true"]{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
  .coin{position:relative}
  .cdot{width:20px;height:20px;border-radius:50%;border:2px solid var(--line2);background:transparent;cursor:pointer;padding:0;flex:0 0 auto}
  .coindot{position:absolute;bottom:6px;right:6px;width:15px;height:15px;border-radius:50%;border:2px solid var(--bg)}
  .colorpop{display:none;position:absolute;z-index:1300;gap:8px;flex-wrap:wrap;width:206px;background:var(--card);border:1px solid var(--line2);border-radius:12px;padding:11px;box-shadow:0 8px 24px rgba(0,0,0,.45)}
  .colorpop button{width:30px;height:30px;border-radius:50%;border:0;cursor:pointer;padding:0}
  .colorpop button.clr{background:var(--card2);border:1px solid var(--line2);color:var(--txt-2);font-size:16px}
  .dz-over{outline:2px dashed var(--accent);outline-offset:3px;border-radius:var(--radius)}
  .draghint{font-size:11px;color:var(--txt-3);margin:4px 2px 0;text-align:center}
  .tmodal{display:none;position:fixed;inset:0;z-index:1200;background:rgba(0,0,0,.55);align-items:flex-start;justify-content:center;padding:38px 14px;overflow:auto}
  .tmodal.show{display:flex}
  .tm-card{width:100%;max-width:560px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
  .tm-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
  .tm-head h3{margin:0;font-size:18px;color:var(--txt)}
  .tm-x{background:transparent;border:1px solid var(--line);color:var(--txt-2);border-radius:999px;width:32px;height:32px;cursor:pointer;font:inherit}
  .tripcard{display:flex;align-items:center;gap:11px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:9px;cursor:pointer}
  .tripcard.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
  .tripcard .tc-main{flex:1;min-width:0}
  .tripcard .tc-name{font-weight:600;font-size:15px;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tripcard .tc-meta{font-size:12px;color:var(--txt-3)}
  .tripcard .tc-badge{font-size:11px;color:var(--accent-ink);background:var(--accent);border-radius:999px;padding:2px 9px;font-weight:600}
  .cammodal{display:none;position:fixed;inset:0;z-index:1400;background:#000;flex-direction:column}
  .cammodal.show{display:flex}
  #capVideo{flex:1;width:100%;height:100%;object-fit:cover;background:#000}
  .cam-flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none}
  .cam-flash.go{animation:camflash .35s ease-out}
  @keyframes camflash{0%{opacity:.85}100%{opacity:0}}
  .cam-top{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:16px;padding-top:max(16px,env(safe-area-inset-top))}
  .cam-top button{width:46px;height:46px;border-radius:50%;border:0;background:rgba(0,0,0,.45);color:#fff;font-size:18px;cursor:pointer}
  .cam-timer{color:#fff;background:rgba(0,0,0,.45);padding:6px 12px;border-radius:999px;font-size:14px;font-variant-numeric:tabular-nums}
  .cam-bottom{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:20px;padding:24px;padding-bottom:max(24px,env(safe-area-inset-bottom))}
  .cam-mode{background:rgba(0,0,0,.45);color:#fff;border:0;border-radius:999px;padding:9px 15px;font:inherit;font-size:13px;cursor:pointer}
  .cam-mode.active{background:var(--accent);color:var(--accent-ink);font-weight:600}
  .cam-shutter{width:72px;height:72px;border-radius:50%;border:5px solid #fff;background:#fff;cursor:pointer;flex:0 0 auto;transition:border-radius .15s,background .15s}
  .cam-shutter.rec{background:#e2574c;border-radius:20px;width:64px;height:64px}
  .uptoast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);z-index:1500;background:var(--accent);color:var(--accent-ink);font-weight:600;font-size:14px;padding:11px 20px;border-radius:999px;box-shadow:0 6px 20px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
  .uptoast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  /* Deling / Følg */
  .sh-intro{color:var(--txt-2);font-size:14px;line-height:1.5;margin:0 0 12px}
  .sh-lab{font-size:12px;color:var(--txt-3);text-transform:uppercase;letter-spacing:.04em;margin:0 0 6px}
  .sh-link input{width:100%}
  .sh-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--line)}
  .sh-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .role-pill{font-size:11px;padding:3px 9px;border-radius:999px;background:var(--card2);border:1px solid var(--line);color:var(--txt-2);white-space:nowrap}
  .sh-rm{background:none;border:1px solid var(--line);color:var(--txt-2);border-radius:999px;padding:5px 11px;font:inherit;font-size:12px;cursor:pointer}
  .sh-end{margin-top:16px;border-color:#e0584d;color:#e0584d}
  .sh-inv{padding:11px 0;border-bottom:1px solid var(--line)}
  .sh-inv-top{display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .sh-inv-act{display:flex;gap:8px;flex-wrap:wrap}
  .sh-roletog{display:flex;gap:8px;margin:8px 0}
  .sh-role{flex:1;background:var(--card2);border:1px solid var(--line);color:var(--txt-2);border-radius:10px;padding:11px;font:inherit;font-size:13px;cursor:pointer}
  .sh-role.on{border-color:var(--accent);color:var(--txt);box-shadow:inset 0 0 0 1px var(--accent)}
  @media(prefers-reduced-motion:reduce){.coin{transition:none}}
</style>

});

function t(key){ return (I18N[LANG]&&I18N[LANG][key]) || I18N.en[key] || I18N.no[key] || key; }
function tr(o){ return o ? (o[LANG]||o.en||o.no||'') : ''; }
function T(no,en){ return LANG==='no'?no:en; }

let LANG = "no", THEME = "deepspace", muted = false, current = 0;
const L = ()=>tr(APP_CONFIG.name);

/* state: mappene per mynt (her bor brukerens omdøping/+).
   TODO: persister til Firestore pr. bruker+tur når innlogget. */
/* ── TURER som beholdere ──
   Hver tur har SITT eget innhold (mynter/mapper/topper/farger).
   En tur kan være en helg, 14 dager i Lofoten, eller 2000 døgn innom mange fjell.
   folderState/coinColor peker alltid på den AKTIVE turen. ── */
function freshFolders(){
  const o={}; APP_CONFIG.coins.forEach(c=> o[c.id]=c.folders.map(f=>JSON.parse(JSON.stringify(f)))); return o;
}
let TRIPS=[], activeTripId=null, tripStates={}, tripColors={};
let folderState={}, coinColor={};
function setActiveTrip(id){
  const tp=TRIPS.find(t=>t.id===id); if(!tp) return;
  activeTripId=id;
  if(!tripStates[id]) tripStates[id]=freshFolders();
  if(!tripColors[id]) tripColors[id]={};
  folderState=tripStates[id]; coinColor=tripColors[id];
  document.getElementById('tripName').textContent=tp.name;
  document.getElementById('tripMeta').textContent=tp.varighet||tp.start||'';
  openFolderIdx=null; openPeakIdx=null;
}
function newTrip(name,varighet,start){
  const id='t'+Date.now()+Math.floor(Math.random()*99);
  TRIPS.push({id, name:name||(t('trip_new')), varighet:varighet||'', start:start||'', created:Date.now()});
  tripStates[id]=freshFolders(); tripColors[id]={};
  setActiveTrip(id); saveState(); return id;
}
function seedDefaultTrip(){
  const id='t'+Date.now();
  TRIPS=[{id, name:tr(APP_CONFIG.trip), varighet:'', start:APP_CONFIG.trip.start||'', created:Date.now()}];
  tripStates[id]=freshFolders(); tripColors[id]={};
  setActiveTrip(id);
}

/* ── oppstart ── */
function init(){
  if(initWatchIfRequested()) return;
  document.documentElement.style.setProperty('--accent', APP_CONFIG.accent);
  document.getElementById('tripIco').textContent = APP_CONFIG.emoji;
  // fyll språkvelger
  const sel=document.getElementById('langSel');
  sel.innerHTML = LANGS.map(l=>'<option value="'+l.c+'">'+l.label+'</option>').join('');
  // auto-språk fra nettleser (nb/nn → no)
  let nav = (navigator.language||"no").slice(0,2).toLowerCase();
  if(nav==="nb"||nav==="nn") nav="no";
  setLang(I18N[nav] ? nav : "en");
  setTheme("deepspace");
  seedDefaultTrip();
  current = 0; // åpne på fremste mynt (Skattkammeret)
  renderCarousel();
  initFirebase();
  checkJoinLink();
  drawStars();
}

/* ── språk ── */
function setLang(l){
  LANG=l;
  document.documentElement.lang = (l==="no") ? "nb" : l; // skjermleser-stemme
  const sel=document.getElementById('langSel'); if(sel) sel.value=l;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n'); el.textContent=t(k);
  });
  document.getElementById('appName').textContent = tr(APP_CONFIG.name);
  document.getElementById('tripName').textContent = tr(APP_CONFIG.trip);
  document.getElementById('aiInput').placeholder = t('ai_placeholder');
  document.getElementById('aiHint').textContent = t('ai_hint');
  document.getElementById('openBtn').textContent = t('open') + " →";
  // Nyere UI-strenger (kart/mikrofon/kontrast/toast) — én kilde i I18N
  { const e=document.getElementById('micBtn'); if(e){ e.title=t('mic_speak'); e.setAttribute('aria-label',t('mic_speak')); } }
  { const e=document.getElementById('contrastBtn'); if(e){ e.title=t('contrast_label'); e.setAttribute('aria-label',t('contrast_label')); } }
  { const e=document.getElementById('mapQ'); if(e) e.placeholder=t('map_ph'); }
  { const e=document.getElementById('mapGmaps'); if(e) e.textContent=t('map_open_gmaps'); }
  { const e=document.getElementById('mapShowBtn'); if(e) e.textContent=t('map_show'); }
  { const e=document.getElementById('uploadToast'); if(e) e.textContent=t('uploading'); }
  renderCarousel();
  if(document.getElementById('folderview').classList.contains('show')) renderFolderView();
  else if(document.getElementById('detail').classList.contains('show')) renderFolders();
}

/* ── tema (6) ── */
function setTheme(th){
  THEME=th; document.documentElement.setAttribute('data-theme', th);
  const sel=document.getElementById('themeSel'); if(sel) sel.value=th;
  drawStars();
}
function toggleDys(){
  const on = document.documentElement.getAttribute('data-font')==='dys';
  document.documentElement.setAttribute('data-font', on?'':'dys');
  document.getElementById('dysBtn').setAttribute('aria-pressed', String(!on));
}
function toggleContrast(){
  const on = document.documentElement.getAttribute('data-contrast')==='on';
  document.documentElement.setAttribute('data-contrast', on?'':'on');
  document.getElementById('contrastBtn').setAttribute('aria-pressed', String(!on));
  drawStars();
}

/* ── carousel ── */
function renderCarousel(){
  const car=document.getElementById('carousel');
  car.querySelectorAll('.coin').forEach(e=>e.remove());
  const n=APP_CONFIG.coins.length, prev=car.querySelector('.prev');

async function filesToMedia(files, cb){
  const uploading = !!(storage && auth && auth.currentUser);
  if(uploading) showUploading(true);
  const arr=[];
  try{
    for(const file of files){
      if(!file || (!file.type.startsWith('image') && !file.type.startsWith('video'))) continue;
      const type=file.type.startsWith('video')?'video':'image';
      if(uploading){
        try{
          const path=APP_CONFIG.id+'/'+auth.currentUser.uid+'/'+Date.now()+'_'+(file.name||'paste').replace(/[^\w.\-]/g,'_');
          const ref=storage.ref().child(path);
          await ref.put(file);
          arr.push({url:await ref.getDownloadURL(), type, name:file.name||'fil', title:suggestMediaName(type), path});
        }catch(e){ arr.push({url:URL.createObjectURL(file), type, name:file.name||'fil', title:suggestMediaName(type)}); }
      }else{
        arr.push({url:URL.createObjectURL(file), type, name:file.name||'fil', title:suggestMediaName(type)}); // demo: kun denne økten
      }
    }
  } finally {
    if(uploading) showUploading(false);
  }
  if(arr.length) cb(arr);
}
let _uploads=0;
function showUploading(on){
  _uploads=Math.max(0,_uploads+(on?1:-1));
  const el=document.getElementById('uploadToast');
  if(el) el.classList.toggle('show', _uploads>0);
}
function pickFiles(cb){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*,video/*'; inp.multiple=true;
  inp.onchange=()=>filesToMedia([...inp.files], cb);
  inp.click();
}

let userGeo=null;
function ensureGeo(cb){
  if(userGeo){ cb(userGeo); return; }
  if(!navigator.geolocation){ cb(null); return; }
  navigator.geolocation.getCurrentPosition(
    p=>{ userGeo={lat:p.coords.latitude, lon:p.coords.longitude}; cb(userGeo); },
    ()=>cb(null), {timeout:6000, maximumAge:600000}
  );
}

function aiHtml(text){
  const esc=escapeHtml(text);
  return esc.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener" style="color:var(--accent)">$1</a>').replace(/\n/g,'<br>');
}
function cleanAI(s){
  return s.split('\n').map(line=>{
    // dropp markdown-tabell-skillelinjer (|---|---|)
    if(/^\s*\|?[\s|:_-]*-{2,}[\s|:_-]*\|?\s*$/.test(line)) return null;
    let l=line;
    l=l.replace(/^\s*>\s?/,'');                                   // fjern sitat-strek (>)
    l=l.replace(/\*\*(.*?)\*\*/g,'$1').replace(/\*(.*?)\*/g,'$1'); // fjern fet/kursiv
    l=l.replace(/`{1,3}/g,'').replace(/^#{1,6}\s*/,'');           // fjern kode/overskrift-tegn
    if(l.includes('|')){                                          // tabell-rad → ren tekst
      l=l.replace(/^\s*\|/,'').replace(/\|\s*$/,'');
      l=l.split('|').map(c=>c.trim()).filter(Boolean).join(': ');
    }
    return l;
  }).filter(l=>l!==null).join('\n').replace(/\n{3,}/g,'\n\n').trim();
}
/* ── Tale-til-tekst (gratis i nettleseren, ingen nøkkel). Sender automatisk når du er ferdig. ── */
const VOICE_LANG={no:'nb-NO',en:'en-US',de:'de-DE',fr:'fr-FR',es:'es-ES',it:'it-IT',ru:'ru-RU',ja:'ja-JP',zh:'zh-CN',pl:'pl-PL'};
let recog=null, recogOn=false;

  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;

  recog.interimResults=false;
  recog.maxAlternatives=1;
  recog.onstart=()=>{ recogOn=true; if(btn){btn.textContent='🔴'; btn.style.opacity='1';} };
  recog.onerror=(e)=>{ recogOn=false; if(btn) btn.textContent='🎤';
    if(e.error==='not-allowed'||e.error==='service-not-allowed') alert(t('mic_denied'));
  };
  recog.onend=()=>{ recogOn=false; if(btn) btn.textContent='🎤'; };
  recog.onresult=(e)=>{
    const txt=(e.results[0] && e.results[0][0] && e.results[0][0].transcript||'').trim();
    if(txt){ const inp=document.getElementById('aiInput'); inp.value=txt; askAI(); }   // ett trykk: snakk → svar
  };
  try{ recog.start(); }catch(err){ /* allerede i gang */ }
}

/* ── kamera/mikrofon-test FØR man går inn ──
   Viser ekte forhåndsvisning. Krever HTTPS eller localhost (ikke file://). */
let mediaStream=null, audioCtx=null, rafMic=null;
async function testMedia(){
  const prev=document.getElementById('camPreview');
  // Allerede i gang? Da slår knappen av (av/på-oppførsel).
  if(mediaStream){ stopMedia(); return; }
  // Rydd alltid opp før ny start (mobil låser kameraet ellers).
  stopMedia();
  document.getElementById('camCloseBtn').textContent = t('cam_close');
  document.getElementById('micLabel').textContent = t('mic_test_hint');
  if(!window.isSecureContext){
    alert(t('cam_secure_ctx'));
    return;
  }
  try{
    mediaStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:true});
    const v=document.getElementById('camVideo');
    v.srcObject=mediaStream; v.muted=true;
    v.setAttribute('playsinline',''); v.playsInline=true;   // iOS: ellers svart/fullskjerm
    await v.play().catch(()=>{});
    prev.style.display='block';
    startMicMeter();
    prev.scrollIntoView({behavior:'smooth',block:'center'});
  }catch(e){
    let msg;
    if(e.name==='NotAllowedError') msg=t('cam_notallowed');
    else if(e.name==='NotFoundError') msg=t('cam_no_cammic');
    else if(e.name==='NotReadableError') msg=t('cam_in_use_full');
    else msg='⚠️ '+e.name+': '+e.message;
    alert(msg);
  }
}
function startMicMeter(){
  try{
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    const src=audioCtx.createMediaStreamSource(mediaStream);
    const an=audioCtx.createAnalyser(); an.fftSize=256; src.connect(an);
    const data=new Uint8Array(an.frequencyBinCount), bar=document.getElementById('micBar');
    (function loop(){
      an.getByteFrequencyData(data);
      const avg=data.reduce((a,b)=>a+b,0)/data.length;
      bar.style.width=Math.min(100,Math.round(avg*1.6))+'%';
      rafMic=requestAnimationFrame(loop);
    })();
  }catch(e){}
}
function stopMedia(){
  if(rafMic) cancelAnimationFrame(rafMic);
  if(audioCtx){ audioCtx.close(); audioCtx=null; }
  if(mediaStream){ mediaStream.getTracks().forEach(t=>t.stop()); mediaStream=null; }
  document.getElementById('camVideo').srcObject=null;
  document.getElementById('camPreview').style.display='none';
}

/* ── KAMERA-OPPTAK i appen (foto + video) — funker på mobil OG PC ── */
let capStream=null, capTarget=null, capMode='photo', capFacing='environment';
let capRec=null, capChunks=[], capTimer=null, capSecs=0;
let capZoom=1, capHwZoom=false, capTrack=null;
function fmtSec(s){ const m=Math.floor(s/60), r=s%60; return m+':'+(r<10?'0':'')+r; }
/* Mobil → bruk telefonens EGET kamera (full oppløsning + ekte optisk zoom, som MyLife).
   PC → kamera i nettleseren (ingen kamera-app å overlate til). */
function isMobileDevice(){
  return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
    || (navigator.maxTouchPoints>1 && /Macintosh/i.test(navigator.userAgent));
}
function nativeCapture(target, mode){
  const inp=document.createElement('input');
  inp.type='file';
  inp.accept = (mode==='video') ? 'video/*' : 'image/*'; // ÉN type → kameraet åpnes pålitelig
  inp.capture='environment';
  inp.onchange=()=>{
    const files=[...inp.files]; if(!files.length) return;
    let title;
    if(mode!=='video'){   // navneforslag for bilde, som i de andre appene
      const ans=prompt(t('cam_photo_name_q'), suggestMediaName('image'));
      title = (ans===null) ? null : (ans.trim()||null);
    }
    filesToMedia(files, arr=>{
      if(title) arr.forEach(m=>m.title=title);
      if(target.kind==='tur'){ curFolder().peaks[target.pi].turer[target.ti].media.push(...arr); }
      else { if(!curFolder().media) curFolder().media=[]; curFolder().media.push(...arr); }
      renderFolderView();
    });
  };
  inp.click();
}
/* Knapper for opptak — tilpasset enhet. Mobil: telefonens kamera (foto/video hver for seg).
   PC: kamera i nettleseren. */
function captureBtns(targetExpr){

async function startCap(){
  stopCapStream();
  try{
    capStream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:capFacing, width:{ideal:3840}, height:{ideal:2160}}, audio:(capMode==='video')
    });
    const v=document.getElementById('capVideo');
    v.srcObject=capStream; v.muted=true; v.setAttribute('playsinline',''); v.playsInline=true;
    await v.play().catch(()=>{});
    setupZoom();
  }catch(e){
    let msg;
    if(e.name==='NotAllowedError') msg=t('cam_blocked');
    else if(e.name==='NotFoundError') msg=t('cam_no_cam');
    else if(e.name==='NotReadableError') msg=t('cam_in_use');
    else msg='⚠️ '+e.name+': '+e.message;
    alert(msg); closeCam();
  }
}
function stopCapStream(){ if(capStream){ capStream.getTracks().forEach(t=>t.stop()); capStream=null; } }
function setupZoom(){
  capZoom=1; capHwZoom=false; capTrack=null;
  const sl=document.getElementById('camZoom'), v=document.getElementById('capVideo');
  v.style.transform=''; v.style.transformOrigin='center center';
  try{
    capTrack=capStream.getVideoTracks()[0];
    const caps=capTrack.getCapabilities ? capTrack.getCapabilities() : {};
    if(caps && caps.zoom && caps.zoom.max>caps.zoom.min){
      capHwZoom=true;
      sl.min=caps.zoom.min; sl.max=caps.zoom.max; sl.step=caps.zoom.step||0.1; sl.value=caps.zoom.min;
      capZoom=caps.zoom.min;
    }else{
      sl.min=1; sl.max=5; sl.step=0.1; sl.value=1; capZoom=1;
    }
  }catch(e){ sl.min=1; sl.max=5; sl.step=0.1; sl.value=1; }
  document.getElementById('camZoomVal').textContent=(+sl.value).toFixed(1)+'×';
}
function setZoom(val){
  capZoom=+val;
  document.getElementById('camZoomVal').textContent=capZoom.toFixed(1)+'×';
  if(capHwZoom && capTrack){
    capTrack.applyConstraints({advanced:[{zoom:capZoom}]}).catch(()=>{});
  }else{
    document.getElementById('capVideo').style.transform='scale('+capZoom+')';
  }
}
// knip-zoom (pinch) på forhåndsvisningen
let pinchStart=0, pinchZoom0=1;
(function bindPinch(){
  const v=document.getElementById('capVideo'); if(!v) return;
  v.addEventListener('touchstart',e=>{ if(e.touches.length===2){ pinchStart=pinchDist(e); pinchZoom0=capZoom; } },{passive:true});
  v.addEventListener('touchmove',e=>{
    if(e.touches.length===2 && pinchStart){
      const sl=document.getElementById('camZoom');
      const ratio=pinchDist(e)/pinchStart;
      let z=Math.min(+sl.max, Math.max(+sl.min, pinchZoom0*ratio));
      sl.value=z; setZoom(z);
    }
  },{passive:true});
  v.addEventListener('touchend',e=>{ if(e.touches.length<2) pinchStart=0; });
})();
function pinchDist(e){ const a=e.touches[0],b=e.touches[1]; return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY); }
function setCamMode(m){
  if(capRec && capRec.state==='recording') return; // ikke bytt midt i opptak
  capMode=m;
  document.getElementById('camModePhoto').classList.toggle('active',m==='photo');
  document.getElementById('camModeVideo').classList.toggle('active',m==='video');
  startCap(); // video trenger lydspor
}
function switchCam(){
  if(capRec && capRec.state==='recording') return;
  capFacing = capFacing==='environment'?'user':'environment';
  startCap();
}
function camShutter(){ capMode==='photo' ? snapPhoto() : toggleRec(); }
function snapPhoto(){
  const v=document.getElementById('capVideo');
  if(!v.videoWidth) return;
  const vw=v.videoWidth, vh=v.videoHeight;
  let sx=0, sy=0, sw=vw, sh=vh;
  if(!capHwZoom && capZoom>1){           // digital zoom: beskjær midten
    sw=vw/capZoom; sh=vh/capZoom; sx=(vw-sw)/2; sy=(vh-sh)/2;
  }
  const c=document.createElement('canvas'); c.width=Math.round(sw); c.height=Math.round(sh);
  c.getContext('2d').drawImage(v, sx,sy,sw,sh, 0,0,c.width,c.height);
  const fl=document.getElementById('camFlash'); fl.classList.remove('go'); void fl.offsetWidth; fl.classList.add('go');
  c.toBlob(b=>{ if(b) deliverCapture(new File([b],'foto_'+Date.now()+'.jpg',{type:'image/jpeg'})); }, 'image/jpeg', 0.95);
  // bildet lagres, kamera blir stående åpent så du kan ta flere
}
let capCanvas=null, capCanvasRaf=null, capCanvasStream=null;
function startCanvasPipe(){
  const v=document.getElementById('capVideo');
  const vw=v.videoWidth||1280, vh=v.videoHeight||720;
  if(!HTMLCanvasElement.prototype.captureStream) return null; // ikke støttet → fall tilbake
  capCanvas=document.createElement('canvas'); capCanvas.width=vw; capCanvas.height=vh;
  const ctx=capCanvas.getContext('2d');
  (function draw(){
    let sw=vw, sh=vh, sx=0, sy=0;
    if(capZoom>1){ sw=vw/capZoom; sh=vh/capZoom; sx=(vw-sw)/2; sy=(vh-sh)/2; }
    try{ ctx.drawImage(v, sx,sy,sw,sh, 0,0,vw,vh); }catch(e){}
    capCanvasRaf=requestAnimationFrame(draw);
  })();
  capCanvasStream=capCanvas.captureStream(30);
  capStream.getAudioTracks().forEach(t=>capCanvasStream.addTrack(t)); // lyd fra mikrofon
  return capCanvasStream;
}
function stopCanvasPipe(){
  if(capCanvasRaf){ cancelAnimationFrame(capCanvasRaf); capCanvasRaf=null; }
  if(capCanvasStream){ capCanvasStream.getVideoTracks().forEach(t=>t.stop()); capCanvasStream=null; }
  capCanvas=null;
}
function toggleRec(){
  if(capRec && capRec.state==='recording'){ capRec.stop(); return; }
  capChunks=[];
  // Maskinvare-zoom ligger allerede i bildene → ta opp råstrøm.
  // Digital zoom → ta opp via canvas så zoomen bakes inn (funker på PC også).
  let recStream = capStream;
  if(!capHwZoom){ const cs=startCanvasPipe(); if(cs) recStream=cs; }
  let opts=null;
  ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm','video/mp4'].some(m=>{
    if(window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(m)){ opts={mimeType:m}; return true; } return false;
  });
  try{ capRec = opts ? new MediaRecorder(recStream,opts) : new MediaRecorder(recStream); }
  catch(e){ stopCanvasPipe(); alert(t('cam_no_vid_support')); return; }
  capRec.ondataavailable=e=>{ if(e.data && e.data.size) capChunks.push(e.data); };
  capRec.onstop=()=>{
    clearInterval(capTimer); capSecs=0; document.getElementById('camTimer').textContent='';
    document.getElementById('camShutter').classList.remove('rec');
    stopCanvasPipe();
    const type=capChunks[0]?capChunks[0].type:'video/webm';
    const ext=type.includes('mp4')?'mp4':'webm';
    const blob=new Blob(capChunks,{type});
    deliverCapture(new File([blob],'video_'+Date.now()+'.'+ext,{type}));
    closeCam(); // lukk etter video
  };
  capRec.start();
  document.getElementById('camShutter').classList.add('rec');
  capSecs=0; document.getElementById('camTimer').textContent='● 0:00';
  capTimer=setInterval(()=>{ capSecs++; document.getElementById('camTimer').textContent='● '+fmtSec(capSecs); },1000);
}
function deliverCapture(file){
  filesToMedia([file], arr=>{
    if(!capTarget) return;
    if(capTarget.kind==='tur'){ curFolder().peaks[capTarget.pi].turer[capTarget.ti].media.push(...arr); }
    else { if(!curFolder().media) curFolder().media=[]; curFolder().media.push(...arr); }
    renderFolderView();
  });
}
function closeCam(){
  if(capRec && capRec.state==='recording'){ try{capRec.stop();}catch(e){} }
  stopCanvasPipe();
  stopCapStream();
  document.getElementById('capVideo').srcObject=null;
  document.getElementById('camModal').classList.remove('show');
  capTarget=null;
}

/* ── Firebase: Auth + Firestore + Storage ──
   Lim inn web-config i APP_CONFIG.firebase. Uten nøkler: lokal demo.
   Datamodell (klar for deling/abonnement senere):
     users/{uid}/apps/{appId}  = { folderState, trip, updatedAt }
   Neste lag: trips/{tripId} med { ownerUid, members:{uid:rolle} } for invitasjoner. */
let fb=null, auth=null, db=null, storage=null, fbUser=null, suppressSave=false, saveTimer=null;
function initFirebase(){
  if(!APP_CONFIG.firebase.apiKey || typeof firebase==='undefined') return; // lokal demo
  try{
    fb=firebase.initializeApp(APP_CONFIG.firebase);
    auth=firebase.auth();
    db=firebase.firestore();
    try{ storage=firebase.storage(); }catch(e){ console.warn('Storage utilgjengelig',e); }
    auth.onAuthStateChanged(async u=>{
      fbUser=u;
      document.getElementById('authStatus').textContent =
        u ? (t('auth_in')+': '+(u.displayName||u.email||'')) : t('auth_demo');
      document.getElementById('authBtn').textContent =
        u ? t('sign_out') : t('sign_in');
      if(u) await loadState();
      if(u && pendingJoin) doJoinNow();
      if(!u && pendingJoin) promptJoinSignin();
    });
  }catch(e){ console.warn('Firebase init feilet — lokal demo.', e); }
}
function userDoc(){ return db.collection('users').doc(fbUser.uid).collection('apps').doc(APP_CONFIG.id); }
function refreshAfterLoad(){
  renderCarousel();
  if(document.getElementById('folderview').classList.contains('show')) renderFolderView();
  else if(document.getElementById('detail').classList.contains('show')) renderFolders();
}
async function loadState(){
  try{
    const snap=await userDoc().get();
    const d=snap.exists?snap.data():null;
    if(d && d.trips && d.trips.length){
      suppressSave=true;
      TRIPS=d.trips; tripStates=d.tripStates||{}; tripColors=d.tripColors||{};
      TRIPS.forEach(tp=>{ if(!tripStates[tp.id]) tripStates[tp.id]=freshFolders(); if(!tripColors[tp.id]) tripColors[tp.id]={}; });
      const want=(d.activeTripId && TRIPS.find(x=>x.id===d.activeTripId)) ? d.activeTripId : TRIPS[0].id;
      setActiveTrip(want);
      suppressSave=false;
      refreshAfterLoad();
    }else if(d && d.folderState){
      // migrer gammel enkelt-tur til den aktive (seedede) turen
      suppressSave=true;
      tripStates[activeTripId]=d.folderState;
      folderState=tripStates[activeTripId];
      if(d.trip && d.trip.name){ const tp=TRIPS.find(t=>t.id===activeTripId); if(tp){ tp.name=d.trip.name; tp.start=d.trip.start||''; setActiveTrip(tp.id); } }
      suppressSave=false;
      refreshAfterLoad();
      saveState();
    }else{
      saveState(); // første innlogging: lagre seed-data
    }
  }catch(e){ console.warn('Kunne ikke laste lagret tilstand.',e); }
}
function saveState(){
  if(!db || !fbUser || suppressSave) return;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    userDoc().set({
      trips: TRIPS,
      activeTripId: activeTripId,
      tripStates: tripStates,
      tripColors: tripColors,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true}).catch(e=>console.warn('Lagring feilet',e));
  },900);
}
function toggleAuth(){
  if(!auth){ alert(t('auth_not_config')); return; }
  if(auth.currentUser){ auth.signOut(); return; }
  const p=new firebase.auth.GoogleAuthProvider();
  // I installert app (PWA) blokkeres pop-up → bruk redirect direkte
  const standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
                     || window.navigator.standalone===true;
  if(standalone){ auth.signInWithRedirect(p).catch(e=>alert(e.message)); return; }
  auth.signInWithPopup(p).catch(e=>{
    if(['auth/popup-blocked','auth/cancelled-popup-request','auth/operation-not-supported-in-this-environment'].includes(e.code))
      auth.signInWithRedirect(p);
    else alert(e.message);
  });
}

function distM(aLat,aLng,bLat,bLng){
  const R=6371000, t=Math.PI/180;
  const dLa=(bLat-aLat)*t, dLo=(bLng-aLng)*t;
  const x=Math.sin(dLa/2)**2 + Math.cos(aLat*t)*Math.cos(bLat*t)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(x));
}
function watchToken(tp){
  if(!tp.watchId){ tp.watchId = (window.crypto&&crypto.randomUUID)?crypto.randomUUID():(genCode()+genCode()+genCode()+genCode()); saveState(); }
  return tp.watchId;
}

/* ── Eier-side: modal + bryter ── */
function openFollow(){
  if(!APP_CONFIG.firebase.apiKey || typeof firebase==='undefined'){ alert(t('auth_not_config')); return; }
  document.getElementById('followModal').classList.add('show'); renderFollow();
}
function closeFollow(){ document.getElementById('followModal').classList.remove('show'); }
function renderFollow(){
  const body=document.getElementById('followBody');
  if(!fbUser){ body.innerHTML='<p class="sh-intro">'+t('followme_signin')+'</p><button class="addbtn" onclick="toggleAuth()">'+t('sign_in')+'</button>'; return; }
  const tp=shTrip(); if(!tp){ body.innerHTML=''; return; }
  let h='<p class="sh-intro">'+t('followme_intro')+'</p>';
  if(!followActive){
    h+='<button class="addbtn" onclick="startFollowMe()">📍 '+t('followme_start')+'</button>';
  }else{
    const wlink=location.origin+location.pathname+'?watch='+(tp.watchId||'');
    h+='<div class="sh-lab">'+t('followme_link')+'</div>';
    h+='<div class="sh-link"><input id="shWatchLink" class="fld" readonly value="'+escapeHtml(wlink)+'"></div>';
    h+='<button class="addbtn" onclick="copyWatchLink()">📋 '+t('followme_copylink')+'</button>';
    h+='<div id="followAcc" class="sh-intro" style="margin-top:12px"></div>';
    h+='<p class="sh-intro" style="margin-top:6px;color:#e0584d">🔴 '+t('live_banner')+'</p>';
    h+='<button class="addbtn sh-end" onclick="stopFollowMe()">⏹️ '+t('followme_stop')+'</button>';
  }
  body.innerHTML=h;
}
function renderFollowUI(){ if(document.getElementById('followModal').classList.contains('show')) renderFollow(); }
function showLiveBanner(on){ const e=document.getElementById('liveBanner'); if(e) e.style.display=on?'block':'none'; }
function copyWatchLink(){
  const el=document.getElementById('shWatchLink'); if(!el) return;
  const done=()=>shToast(t('share_copied'));
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(el.value).then(done).catch(()=>fallbackCopy(el.value,done)); }
  else fallbackCopy(el.value,done);
}

async function startFollowMe(){
  const tp=shTrip(); if(!tp) return;
  if(!db || !fbUser){ alert(t('followme_signin')); return; }
  if(!navigator.geolocation){ alert(t('gps_none')); return; }
  const token=watchToken(tp);
  try{
    await db.collection('publicShare').doc(token).set({
      ownerUid:fbUser.uid, title:(tp.name||''), ownerName:(fbUser.displayName||fbUser.email||''),
      active:true, track:[], startedAt:firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true});
  }catch(e){ console.warn('startFollow skriv feilet',e); alert(t('join_fail')); return; }
  liveTrack=[]; lastPos=null; lastWriteTs=0; followActive=true;
  followWatchId=navigator.geolocation.watchPosition(onFollowPos, e=>console.warn('GPS',e),
    {enableHighAccuracy:true, maximumAge:0, timeout:30000});
  showLiveBanner(true); renderFollowUI();
}
function onFollowPos(p){
  if(!followActive) return;
  const now=Date.now(), lat=p.coords.latitude, lng=p.coords.longitude, acc=Math.round(p.coords.accuracy||0);
  const accEl=document.getElementById('followAcc');
  if(accEl) accEl.textContent='📡 '+t('acc_label')+': ±'+acc+' m'+(acc>150?(' '+t('acc_poor')):'');
  const moved = lastPos ? distM(lastPos.lat,lastPos.lng,lat,lng) : 9999;
  const better = (lastAcc!=null && acc < lastAcc-15);
  if(now-lastWriteTs < 15000 && moved < 25 && !better) return;   // strupe, men slipp gjennom bedre fiks
  lastWriteTs=now; lastPos={lat,lng}; lastAcc=acc;
  liveTrack.push({lat,lng,t:now}); if(liveTrack.length>300) liveTrack=liveTrack.slice(-300);
  const tp=shTrip(); if(!tp||!tp.watchId||!db) return;
  db.collection('publicShare').doc(tp.watchId).set({
    pos:{lat,lng,acc,ts:now}, track:liveTrack,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  },{merge:true}).catch(e=>console.warn('live skriv feilet (køes om offline)',e));
}
async function stopFollowMe(){
  if(followWatchId!=null){ navigator.geolocation.clearWatch(followWatchId); followWatchId=null; }
  followActive=false; showLiveBanner(false);
  const tp=shTrip();
  if(tp && tp.watchId && db){
    try{ await db.collection('publicShare').doc(tp.watchId).set({active:false, updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}); }catch(e){}
  }
  renderFollowUI();
}

/* ── Følger-side (ingen innlogging): ?watch=token ── */
function setWatchStatus(m){ const e=document.getElementById('watchStatus'); if(e) e.textContent=m; }
function setWatchTitle(m){ const e=document.getElementById('watchTitle'); if(e) e.textContent=m; }
function nb(no,en){ return (LANG==='no')?no:en; }
function initWatchIfRequested(){
  const token=new URLSearchParams(location.search).get('watch');
  if(!token) return false;
  const wv=document.getElementById('watchView'); if(wv) wv.style.display='block';
  let nv=(navigator.language||'no').slice(0,2).toLowerCase(); if(nv==='nb'||nv==='nn')nv='no';
  LANG = I18N[nv] ? nv : 'en';
  document.documentElement.lang = (LANG==='no')?'nb':LANG;
  setWatchTitle('EasySatBox');
  setWatchStatus(nb('Laster kart…','Loading map…'));
  initFirebase();          // setter db; ingen innlogging nødvendig for å LESE publicShare
  if(!db){ setWatchStatus(nb('Database utilgjengelig.','Database unavailable.')); return true; }
  ensureLeaflet(()=>startWatch(token));
  return true;
}
function ensureLeaflet(cb){
  if(typeof window.L!=='undefined'){ cb(); return; }
  const css=document.createElement('link'); css.rel='stylesheet'; css.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'; document.head.appendChild(css);
  const s=document.createElement('script'); s.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
  s.onload=()=>cb();
  s.onerror=()=>setWatchStatus(nb('Kunne ikke laste kartet (nett/blokkering).','Could not load map (network/blocked).'));
  document.head.appendChild(s);
}
function startWatch(token){
  if(typeof window.L==='undefined'){ setWatchStatus(nb('Kart utilgjengelig.','Map unavailable.')); return; }
  let map;
  try{
    map=window.L.map('watchMap',{zoomControl:true}).setView([62.0,9.0],5);
    window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
    setTimeout(()=>{ try{ map.invalidateSize(); }catch(e){} }, 250);
  }catch(e){ setWatchStatus(nb('Kartfeil: ','Map error: ')+(e&&e.message||e)); return; }
  setWatchStatus(nb('Kobler til…','Connecting…'));
  let marker=null, trail=null, accCircle=null, centered=false, lastTs=0, lastActive=true, lastAccV=0, gotData=false;
  db.collection('publicShare').doc(token).onSnapshot(snap=>{
    gotData=true;
    if(!snap.exists){ setWatchStatus(t('watch_notfound')); return; }
    const d=snap.data();
    setWatchTitle(d.title||t('followme_title'));
    lastActive = d.active!==false;
    const pts=(d.track||[]).map(p=>[p.lat,p.lng]);
    if(pts.length){ if(trail) trail.setLatLngs(pts); else trail=window.L.polyline(pts,{color:'#e0584d',weight:4,opacity:.85}).addTo(map); }
    if(d.pos){
      const ll=[d.pos.lat,d.pos.lng], acc=d.pos.acc||0;
      if(marker) marker.setLatLng(ll); else marker=window.L.marker(ll).addTo(map);
      if(acc>0){ if(accCircle){ accCircle.setLatLng(ll); accCircle.setRadius(acc); } else accCircle=window.L.circle(ll,{radius:acc,color:'#4a90d9',weight:1,fillOpacity:.12}).addTo(map); }
      if(!centered){ map.setView(ll, acc>2000?11:14); centered=true; } else map.panTo(ll,{animate:true});
      lastTs=d.pos.ts||0; lastAccV=acc;
      renderSeen(lastTs,lastActive,acc);
    } else {
      setWatchStatus(lastActive ? nb('Venter på posisjon… (deler fra en enhet uten GPS?)','Waiting for position… (sharing from a device without GPS?)') : t('watch_ended'));
    }
  }, err=>{
    const code=(err&&err.code)||'';
    if(code==='permission-denied') setWatchStatus(nb('Tilgang avvist — publiser firestore-reglene (publicShare).','Access denied — publish the Firestore rules (publicShare).'));
    else setWatchStatus(t('watch_notfound')+(code?(' ('+code+')'):''));
  });
  setTimeout(()=>{ if(!gotData) setWatchStatus(nb('Ingen respons fra databasen ennå…','No response from database yet…')); }, 6000);
  setInterval(()=>{ if(marker) renderSeen(lastTs,lastActive,lastAccV); }, 30000);
}
function renderSeen(ts,active,acc){
  const el=document.getElementById('watchStatus'); if(!el) return;
  if(active===false){ el.textContent=t('watch_ended'); return; }
  const a=(acc&&acc>0)?(' · ±'+Math.round(acc)+' m'+(acc>150?(' '+t('acc_poor')):'')):'';
  if(!ts){ el.textContent='🔴 '+t('watch_live')+a; return; }
  const mins=Math.floor((Date.now()-ts)/60000);
  if(mins<1){ el.textContent='🔴 '+t('watch_live')+a; return; }
  const clk=new Date(ts).toLocaleTimeString(LANG==='no'?'no-NO':undefined,{hour:'2-digit',minute:'2-digit'});
  el.textContent=t('watch_lastseen')+' '+clk+a;
}


/* ── stjernebakgrunn (mørke romtemaer) ── */
let _starsBound=false;
function drawStars(){
  const c=document.getElementById('stars'); if(!c) return;
  const ctx=c.getContext('2d'), dpr=window.devicePixelRatio||1;
  function size(){ c.width=innerWidth*dpr; c.height=innerHeight*dpr; draw(); }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    for(let i=0;i<140;i++){
      const x=Math.random()*c.width, y=Math.random()*c.height, r=Math.random()*1.4*dpr;
      ctx.globalAlpha=Math.random()*0.7+0.2; ctx.fillStyle='#cfe3ff';
      ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  if(!_starsBound){ addEventListener('resize',size); _starsBound=true; }
  size();
}

init();

/* PWA: registrer service worker (installerbar + åpner offline) */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW feilet', e));
  });
}
