<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>EasySatBox Tours — mal</title>
<style>
  /* ============================================================
     FELLES GRUNNMUR — STIL
     Tre temaer: Rom (default), Svart, Kontrast (UU).
     Bytt aldri på dette per app — det arves likt av alle.
  ============================================================ */
  :root{
    --accent:#1de9a6; --accent-ink:#06321f;
    --bg:#070d1c; --bg2:#0c1428; --card:#101a30; --card2:#15233f;
    --line:#213152; --line2:#2c3d63;
    --txt:#eaf2ff; --txt-2:#9fb2d8; --txt-3:#6b7da3;
    --radius:14px; --maxw:760px;
  }
  html[data-theme="svart"]{
    --bg:#000000; --bg2:#070707; --card:#0e0e0e; --card2:#161616;
    --line:#262626; --line2:#383838; --txt:#f2f2f2; --txt-2:#9a9a9a; --txt-3:#6a6a6a;
  }
  html[data-theme="kontrast"]{
    --accent:#ffd400; --accent-ink:#000000;
    --bg:#000000; --bg2:#000000; --card:#000000; --card2:#0a0a0a;
    --line:#ffffff; --line2:#ffffff; --txt:#ffffff; --txt-2:#ffffff; --txt-3:#e6e6e6;
    --radius:8px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    margin:0; background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    min-height:100vh; overflow-x:hidden;
  }
  /* romstjerner (kun Rom-tema) */
  #stars{position:fixed;inset:0;pointer-events:none;opacity:.55;z-index:0}
  html[data-theme="svart"] #stars,html[data-theme="kontrast"] #stars{display:none}
  .wrap{position:relative;z-index:1;max-width:var(--maxw);margin:0 auto;padding:14px 16px 40px}

  /* topplinje */
  header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:18px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px}
  .logo{width:40px;height:40px;border-radius:11px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:22px}
  .brand h1{font-size:17px;margin:0;line-height:1.1;font-weight:600}
  .brand p{font-size:11px;margin:0;color:var(--txt-3);letter-spacing:.12em;text-transform:uppercase}
  .controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .seg button{background:transparent;border:0;color:var(--txt-2);font:inherit;font-size:13px;padding:7px 13px;cursor:pointer}
  .seg button[aria-pressed="true"]{background:var(--accent);color:var(--accent-ink);font-weight:600}
  .iconbtn{width:38px;height:38px;border-radius:999px;background:var(--card);border:1px solid var(--line);color:var(--txt-2);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}

  /* turbar */
  .tripbar{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:10px 12px;margin-bottom:18px}
  .tripbar .ico{width:34px;height:34px;border-radius:9px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:18px}
  .tripbar .t1{font-size:14px;font-weight:600;line-height:1.2}
  .tripbar .t2{font-size:12px;color:var(--txt-3)}
  .tripbar button{margin-left:auto;background:transparent;border:1px solid var(--line2);color:var(--txt-2);border-radius:999px;padding:6px 12px;font:inherit;font-size:12px;cursor:pointer}

  /* carousel */
  .stage{text-align:center;margin:6px 0 4px}
  .stage h2{font-size:26px;margin:0 0 4px;font-weight:700}
  .stage p{font-size:13px;color:var(--txt-2);margin:0 0 18px}
  .carousel{position:relative;display:flex;align-items:center;justify-content:center;gap:12px;min-height:160px;touch-action:pan-y}
  .coin{flex:0 0 auto;border-radius:50%;background:var(--card);border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .28s cubic-bezier(.4,0,.2,1);color:var(--txt-3)}
  .coin .emoji{font-size:24px;filter:grayscale(.4);opacity:.7}
  .coin.far{width:42px;height:42px;opacity:.35}
  .coin.near{width:60px;height:60px}
  .coin.near .emoji{font-size:26px}
  .coin.active{width:96px;height:96px;background:var(--card2);border:2px solid var(--accent);box-shadow:0 0 0 6px color-mix(in srgb,var(--accent) 14%,transparent);color:var(--txt)}
  .coin.active .emoji{font-size:42px;filter:none;opacity:1}
  .arrow{position:absolute;top:50%;transform:translateY(-50%);width:42px;height:42px;border-radius:50%;background:var(--card);border:1px solid var(--line);color:var(--txt-2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2}
  .arrow.prev{left:0} .arrow.next{right:0}
  .label{text-align:center;margin:16px 0 6px}
  .label h3{font-size:20px;margin:0;font-weight:600}
  .label p{font-size:13px;color:var(--txt-2);margin:4px 0 0}
  .dots{display:flex;gap:7px;justify-content:center;margin:14px 0}
  .dots i{width:7px;height:7px;border-radius:50%;background:var(--line2);cursor:pointer}
  .dots i.on{background:var(--accent);width:20px;border-radius:4px}
  .open-btn{display:block;width:100%;max-width:340px;margin:8px auto 0;background:var(--accent);color:var(--accent-ink);border:0;border-radius:999px;padding:15px;font:inherit;font-size:16px;font-weight:700;cursor:pointer}

  /* kameratest + footer-info */
  .pretest{display:flex;gap:8px;justify-content:center;margin:18px 0 0;flex-wrap:wrap}
  .pretest button{background:var(--card);border:1px solid var(--line);color:var(--txt-2);border-radius:999px;padding:9px 14px;font:inherit;font-size:13px;cursor:pointer}

  /* mynt-detalj (mapper) */
  .detail{display:none}
  .detail.show{display:block}
  .stage.hide,.carousel.hide,.label.hide,.dots.hide,.open-btn.hide,.pretest.hide{display:none}
  .back{background:transparent;border:0;color:var(--txt-2);font:inherit;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;padding:4px 0;margin-bottom:6px}
  .dhead{text-align:center;margin:6px 0 16px}
  .dhead .emoji{font-size:40px}
  .dhead h3{font-size:22px;margin:6px 0 2px;font-weight:600}
  .dhead p{font-size:13px;color:var(--txt-2);margin:0}
  .folder{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px;margin-bottom:9px}
  .folder.flag{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,var(--card))}
  .folder .femoji{font-size:19px;width:24px;text-align:center}
  .folder .fname{flex:1;font-size:15px;background:transparent;border:0;color:var(--txt);font:inherit;outline:none;border-bottom:1px solid transparent;padding:2px 0}
  .folder .fname:focus{border-bottom:1px solid var(--accent)}
  .folder .fsub{font-size:11px;color:var(--txt-3);display:block;margin-top:2px}
  .badge{font-size:10px;color:var(--accent-ink);background:var(--accent);padding:2px 8px;border-radius:999px;font-weight:600}
  .folder .pen,.folder .del{background:transparent;border:0;color:var(--txt-3);font-size:15px;cursor:pointer;padding:4px}
  .addfolder{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:transparent;border:1px dashed var(--line2);border-radius:var(--radius);padding:12px;color:var(--accent);font:inherit;font-size:14px;cursor:pointer}

  /* klikkbare mapper + topp-/turvisning */
  .folder{cursor:pointer}
  .folder .fname2{font-size:15px;color:var(--txt)}
  .folder .chev{color:var(--txt-3);font-size:18px;margin-left:2px}
  .fcount{font-size:12px;color:var(--txt-3);white-space:nowrap}
  .vtitle{display:flex;align-items:center;gap:10px;margin:4px 0 14px}
  .vtitle .e{font-size:30px}
  .vtitle h3{font-size:21px;margin:0;font-weight:600;flex:1}
  .vtitle .sub{font-size:12px;color:var(--txt-2);margin:2px 0 0}
  .addbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:transparent;border:1px dashed var(--line2);border-radius:var(--radius);padding:13px;color:var(--accent);font:inherit;font-size:14px;cursor:pointer;margin-top:4px}
  .peakcard{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:9px;cursor:pointer}
  .peakcard .pemoji{font-size:26px}
  .peakcard .pn{font-size:16px;font-weight:600}
  .peakcard .pe{font-size:12px;color:var(--txt-3);margin-top:1px}
  .peakcard .cnt{margin-left:auto;font-size:13px;color:var(--accent);font-weight:600;white-space:nowrap}
  .turcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:13px;margin-bottom:11px}
  .turcard .th{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
  .turcard .tlabel{font-size:14px;font-weight:600;color:var(--accent)}
  .fld{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:10px;color:var(--txt);font:inherit;font-size:14px;padding:10px;outline:none;margin-bottom:8px}
  .fld:focus{border-color:var(--accent)}
  textarea.fld{min-height:58px;resize:vertical}
  .mediagrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:8px;margin:4px 0 8px}
  .thumb{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;border:1px solid var(--line);background:#000;cursor:pointer}
  .thumb img,.thumb video{width:100%;height:100%;object-fit:cover;display:block}
  .thumb .x{position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:0;font-size:14px;line-height:1;cursor:pointer}
  .addmedia{display:flex;align-items:center;justify-content:center;gap:7px;background:var(--card2);border:1px dashed var(--line2);color:var(--txt-2);border-radius:10px;padding:10px;font:inherit;font-size:13px;cursor:pointer;width:100%}
  .tinybtn{background:transparent;border:0;color:var(--txt-3);font-size:15px;cursor:pointer;padding:2px 4px}

  /* fullskjerm-fremviser */
  .viewer{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.94);display:none;align-items:center;justify-content:center;touch-action:pan-y}
  .viewer.show{display:flex}
  .vstage{max-width:96vw;max-height:86vh;display:flex;align-items:center;justify-content:center}
  .vstage img,.vstage video{max-width:96vw;max-height:86vh;border-radius:8px;display:block}
  .vclose{position:absolute;top:14px;right:16px;width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.14);color:#fff;border:0;font-size:20px;cursor:pointer;z-index:2}
  .vnav{position:absolute;top:50%;transform:translateY(-50%);width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.14);color:#fff;border:0;font-size:28px;line-height:1;cursor:pointer;z-index:2}
  .vprev{left:12px} .vnext{right:12px}
  .vcount{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);color:#fff;font-size:13px;background:rgba(0,0,0,.45);padding:5px 13px;border-radius:999px}

  /* AI-boks (AI overalt) */
  .ai{margin-top:18px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px}
  .ai .row{display:flex;gap:8px}
  .ai input{flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:10px;color:var(--txt);font:inherit;font-size:14px;padding:11px 12px;outline:none}
  .ai input:focus{border-color:var(--accent)}
  .ai .send{background:var(--accent);color:var(--accent-ink);border:0;border-radius:10px;padding:0 16px;font:inherit;font-weight:600;cursor:pointer}
  .ai .hint{font-size:11px;color:var(--txt-3);margin:8px 2px 0}
  .ai .answer{margin-top:10px;font-size:14px;line-height:1.55;color:var(--txt);white-space:pre-wrap;display:none}
  .ai .answer.show{display:block}

  /* auth-stripe */
  .authbar{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--txt-3);justify-content:center;margin-top:26px}
  .authbar button{background:transparent;border:1px solid var(--line);color:var(--txt-2);border-radius:999px;padding:5px 12px;font:inherit;font-size:12px;cursor:pointer}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
  @media(prefers-reduced-motion:reduce){.coin{transition:none}}
</style>
</head>
<body>
<canvas id="stars"></canvas>

<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo" id="appLogo">⛰️</div>
      <div>
        <h1 id="appName">Fjelltur</h1>
        <p data-i18n="tagline">Inngangsdøren</p>
      </div>
    </div>
    <div class="controls">
      <div class="seg" role="group" aria-label="Språk">
        <button id="lang-no" aria-pressed="true" onclick="setLang('no')">NO</button>
        <button id="lang-en" aria-pressed="false" onclick="setLang('en')">EN</button>
      </div>
      <div class="seg" role="group" aria-label="Tema">
        <button id="th-rom" aria-pressed="true" onclick="setTheme('rom')" data-i18n="th_rom">Rom</button>
        <button id="th-svart" aria-pressed="false" onclick="setTheme('svart')" data-i18n="th_svart">Svart</button>
        <button id="th-kontrast" aria-pressed="false" onclick="setTheme('kontrast')" data-i18n="th_kontrast">Kontrast</button>
      </div>
      <button class="iconbtn" id="muteBtn" aria-label="Lyd" onclick="toggleMute()">🔊</button>
    </div>
  </header>

  <div class="tripbar">
    <div class="ico" id="tripIco">⛰️</div>
    <div>
      <div class="t1" id="tripName">Tur 014 — Børgefjell</div>
      <div class="t2"><span data-i18n="start">Start</span>: <span id="tripStart">Viermdalen</span></div>
    </div>
    <button onclick="editTrip()" data-i18n="edit_trip">Endre tur</button>
  </div>

  <!-- ===== CAROUSEL (sliding door) ===== -->
  <div class="stage" id="stage">
    <h2 data-i18n="pick">Velg en mynt</h2>
    <p data-i18n="swipe">Sveip sidelengs eller bruk pilene. Mynten foran deg åpnes.</p>
  </div>
  <div class="carousel" id="carousel" aria-label="Mynter">
    <button class="arrow prev" aria-label="Forrige" onclick="move(-1)">‹</button>
    <button class="arrow next" aria-label="Neste" onclick="move(1)">›</button>
  </div>
  <div class="label" id="coinLabel"></div>
  <div class="dots" id="dots"></div>
  <button class="open-btn" id="openBtn" onclick="openCoin()"></button>

  <div class="pretest" id="pretest" style="flex-direction:column;align-items:center">
    <button onclick="testMedia()" data-i18n="test_media">📷 Test kamera og mikrofon</button>
    <div id="camPreview" style="display:none;margin-top:12px;text-align:center;width:100%">
      <video id="camVideo" playsinline autoplay muted style="width:100%;max-width:320px;border-radius:14px;border:1px solid var(--line);background:#000;transform:scaleX(-1)"></video>
      <div style="height:6px;max-width:320px;margin:8px auto 0;background:var(--card);border-radius:999px;overflow:hidden"><div id="micBar" style="height:100%;width:0;background:var(--accent);transition:width .08s"></div></div>
      <div style="font-size:11px;color:var(--txt-3);margin-top:4px" id="micLabel"></div>
      <button onclick="stopMedia()" style="margin-top:10px;background:var(--card);border:1px solid var(--line);color:var(--txt-2);border-radius:999px;padding:8px 14px;font:inherit;font-size:13px;cursor:pointer" id="camCloseBtn"></button>
    </div>
  </div>

  <!-- ===== MYNT-DETALJ (mapper) ===== -->
  <div class="detail" id="detail">
    <button class="back" onclick="closeCoin()">‹ <span data-i18n="back">Tilbake til mynter</span></button>
    <div class="dhead">
      <div class="emoji" id="dEmoji"></div>
      <h3 id="dTitle"></h3>
      <p id="dSub"></p>
    </div>
    <div id="folders"></div>
    <button class="addfolder" onclick="addFolder()">＋ <span data-i18n="add_folder">Legg til egen mappe</span></button>

    <div class="ai">
      <div class="row">
        <input id="aiInput" placeholder="" />
        <button class="send" onclick="askAI()" data-i18n="ask">Spør</button>
      </div>
      <div class="hint" id="aiHint"></div>
      <div class="answer" id="aiAnswer"></div>
    </div>
  </div>

  <!-- ===== MAPPE-INNHOLD (åpnet mappe: topper / media) ===== -->
  <div class="detail" id="folderview"></div>

  <div class="authbar">
    <span id="authStatus" data-i18n="auth_demo">Lokal demo — ikke innlogget</span>
    <button id="authBtn" onclick="toggleAuth()" data-i18n="sign_in">Logg inn</button>
  </div>
</div>

<!-- ===== FULLSKJERM-FREMVISER (foredrag/mimring) ===== -->
<div id="viewer" class="viewer" role="dialog" aria-modal="true" aria-label="Bildevisning" onclick="if(event.target===this)closeViewer()">
  <button class="vclose" aria-label="Lukk" onclick="closeViewer()">✕</button>
  <button class="vnav vprev" aria-label="Forrige" onclick="viewerNav(-1)">‹</button>
  <div id="viewerStage" class="vstage"></div>
  <button class="vnav vnext" aria-label="Neste" onclick="viewerNav(1)">›</button>
  <div id="viewerCount" class="vcount"></div>
</div>

<!-- Firebase (compat) — valgfritt. Appen funker uten, da kjører lokal demo. -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

/* ── oppstart ── */
function init(){
  document.documentElement.style.setProperty('--accent', APP_CONFIG.accent);
  document.getElementById('appLogo').textContent = APP_CONFIG.emoji;
  document.getElementById('tripIco').textContent = APP_CONFIG.emoji;
  // auto-språk fra nettleser (nb/nn → no)
  let nav = (navigator.language||"no").slice(0,2).toLowerCase();
  if(nav==="nb"||nav==="nn") nav="no";
  setLang(I18N[nav] ? nav : "no");

/* ── språk ── */
function setLang(l){
  LANG=l;
  document.documentElement.lang = (l==="no") ? "nb" : "en"; // skjermleser-stemme
  document.getElementById('lang-no').setAttribute('aria-pressed', l==='no');
  document.getElementById('lang-en').setAttribute('aria-pressed', l==='en');
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n'); if(I18N[l][k]) el.textContent=I18N[l][k];
  });
  document.getElementById('appName').textContent = APP_CONFIG.name[l];
  document.getElementById('tripName').textContent = APP_CONFIG.trip[l]||APP_CONFIG.trip.no;
  document.getElementById('aiInput').placeholder = I18N[l].ai_placeholder;
  document.getElementById('aiHint').textContent = I18N[l].ai_hint;
  document.getElementById('openBtn').textContent = I18N[l].open + " →";
  renderCarousel();
  if(document.getElementById('detail').classList.contains('show')) renderFolders();
}

/* ── tema ── */
function setTheme(t){
  THEME=t; document.documentElement.setAttribute('data-theme', t);
  ['rom','svart','kontrast'].forEach(x=>
    document.getElementById('th-'+x).setAttribute('aria-pressed', x===t));
}

/* ── carousel ── */
function renderCarousel(){
  const car=document.getElementById('carousel');
  car.querySelectorAll('.coin').forEach(e=>e.remove());
  const n=APP_CONFIG.coins.length, prev=car.querySelector('.prev');
  APP_CONFIG.coins.forEach((c,i)=>{
    const d=Math.abs(i-current);
    if(d>2) return;
    const el=document.createElement('div');
    el.className='coin '+(i===current?'active':d===1?'near':'far');
    el.innerHTML='<span class="emoji">'+c.emoji+'</span>';
    el.setAttribute('role','button');
    el.setAttribute('aria-label', c.name[LANG]);
    el.onclick=()=> i===current ? openCoin() : (current=i, renderCarousel());
    car.insertBefore(el, prev.nextSibling);
  });
  // reflow i visuell rekkefølge
  const order=[...car.querySelectorAll('.coin')];
  order.sort((a,b)=>0);
  const c=APP_CONFIG.coins[current];
  document.getElementById('coinLabel').innerHTML =
    '<h3>'+c.name[LANG]+'</h3><p>'+c.sub[LANG]+'</p>';
  const dots=document.getElementById('dots'); dots.innerHTML='';
  APP_CONFIG.coins.forEach((_,i)=>{
    const dot=document.createElement('i');
    if(i===current) dot.className='on';
    dot.onclick=()=>{current=i;renderCarousel();};
    dots.appendChild(dot);
  });
}
function move(dir){
  current=Math.max(0,Math.min(APP_CONFIG.coins.length-1,current+dir));
  renderCarousel();
}
document.addEventListener('keydown',e=>{
  if(document.getElementById('detail').classList.contains('show'))return;
  if(document.getElementById('folderview').classList.contains('show'))return;
  if(document.getElementById('viewer').classList.contains('show'))return;
  if(e.key==='ArrowLeft')move(-1); if(e.key==='ArrowRight')move(1);
  if(e.key==='Enter')openCoin();
});
// touch-swipe
let tsx=0;
const car=document.getElementById('carousel');
car.addEventListener('touchstart',e=>tsx=e.touches[0].clientX,{passive:true});
car.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tsx;
  if(Math.abs(dx)>40) move(dx<0?1:-1);
});

(function(){
  let vx=0;
  const v=document.getElementById('viewer');
  v.addEventListener('touchstart',e=>vx=e.touches[0].clientX,{passive:true});
  v.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-vx;
    if(Math.abs(dx)>45) viewerNav(dx<0?1:-1);
  });
})();
function pickFiles(cb){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*,video/*'; inp.multiple=true;
  inp.onchange=async ()=>{
    const files=[...inp.files]; if(!files.length)return;
    const arr=[];
    for(const file of files){
      const type=file.type.startsWith('video')?'video':'image';
      if(storage && auth && auth.currentUser){
        try{
          const path=APP_CONFIG.id+'/'+auth.currentUser.uid+'/'+Date.now()+'_'+file.name.replace(/[^\w.\-]/g,'_');
          const ref=storage.ref().child(path);
          await ref.put(file);
          arr.push({url:await ref.getDownloadURL(), type, name:file.name, path});
        }catch(e){
          console.warn('Opplasting feilet, lokal visning.',e);
          arr.push({url:URL.createObjectURL(file), type, name:file.name});
        }
      }else{
        arr.push({url:URL.createObjectURL(file), type, name:file.name}); // demo: kun denne økten
      }
    }
    cb(arr);
  };
  inp.click();
}
function escapeHtml(s){return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

  const inp=document.getElementById('aiInput'), out=document.getElementById('aiAnswer');
  const q=inp.value.trim(); if(!q) return;
  const c=APP_CONFIG.coins[current];
  out.classList.add('show'); out.textContent = (LANG==='no'?'Tenker…':'Thinking…');
  try{
    const r=await fetch(APP_CONFIG.aiProxyUrl,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:600,
        system:'Du er en turassistent i appen «'+L()+'», modul «'+c.name[LANG]+'». Svar kort, konkret og trygt. Brukerens språk: '+LANG+'.',
        messages:[{role:'user',content:q}]
      })
    });
    if(!r.ok) throw new Error('proxy '+r.status);
    const data=await r.json();
    const txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n') || JSON.stringify(data);
    out.textContent=txt;
  }catch(err){
    out.textContent = (LANG==='no'
      ? '⚠️ AI-proxy ikke koblet til ennå. Sett opp /api/claude i backend (Railway/Netlify) med ANTHROPIC_API_KEY.\n('+err.message+')'
      : '⚠️ AI proxy not connected yet. Set up /api/claude in the backend.\n('+err.message+')');
  }
  inp.value='';
}
document.getElementById('aiInput').addEventListener('keydown',e=>{if(e.key==='Enter')askAI();});

/* ── kamera/mikrofon-test FØR man går inn ──
   Viser ekte forhåndsvisning. Krever HTTPS eller localhost (ikke file://). */
let mediaStream=null, audioCtx=null, rafMic=null;
async function testMedia(){
  const prev=document.getElementById('camPreview');
  // Allerede i gang? Da slår knappen av (av/på-oppførsel).
  if(mediaStream){ stopMedia(); return; }
  // Rydd alltid opp før ny start (mobil låser kameraet ellers).
  stopMedia();
  document.getElementById('camCloseBtn').textContent = LANG==='no'?'Lukk forhåndsvisning':'Close preview';
  document.getElementById('micLabel').textContent = LANG==='no'?'Snakk — søylen skal bevege seg':'Speak — the bar should move';
  if(!window.isSecureContext){
    alert(LANG==='no'
      ? '⚠️ Kamera krever HTTPS eller localhost. Du har trolig åpnet fila direkte (file://).\n\nKjør den fra en server i stedet:\n1) Åpne mappa i terminal\n2) python3 -m http.server 8000\n3) Gå til http://localhost:8000 i Chrome\n\nEller deploy til Netlify/Railway (HTTPS).'
      : '⚠️ Camera requires HTTPS or localhost. You likely opened the file via file://.\nServe it: python3 -m http.server 8000 → http://localhost:8000');
    return;
  }
  try{
    mediaStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:true});
    const v=document.getElementById('camVideo');
    v.srcObject=mediaStream; v.muted=true;
    v.setAttribute('playsinline',''); v.playsInline=true;   // iOS: ellers svart/fullskjerm
    await v.play().catch(()=>{});
    prev.style.display='block';
    startMicMeter();
    prev.scrollIntoView({behavior:'smooth',block:'center'});
  }catch(e){
    let msg;
    if(e.name==='NotAllowedError') msg=LANG==='no'
      ? '⚠️ Tilgang blokkert. Trykk lås-/innstillingsikonet til venstre i adressefeltet → Tillatelser → tillat kamera og mikrofon, og last siden på nytt.'
      : '⚠️ Permission blocked. Click the lock icon → allow camera and microphone, then reload.';
    else if(e.name==='NotFoundError') msg=LANG==='no'?'⚠️ Fant ikke kamera/mikrofon på enheten.':'⚠️ No camera/microphone found.';
    else if(e.name==='NotReadableError') msg=LANG==='no'?'⚠️ Kameraet er i bruk av et annet program. Lukk Teams/Zoom/andre faner og prøv igjen.':'⚠️ Camera is in use by another app.';
    else msg='⚠️ '+e.name+': '+e.message;
    alert(msg);
  }
}
function startMicMeter(){
  try{
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    const src=audioCtx.createMediaStreamSource(mediaStream);
    const an=audioCtx.createAnalyser(); an.fftSize=256; src.connect(an);
    const data=new Uint8Array(an.frequencyBinCount), bar=document.getElementById('micBar');
    (function loop(){
      an.getByteFrequencyData(data);
      const avg=data.reduce((a,b)=>a+b,0)/data.length;
      bar.style.width=Math.min(100,Math.round(avg*1.6))+'%';
      rafMic=requestAnimationFrame(loop);
    })();
  }catch(e){}
}
function stopMedia(){
  if(rafMic) cancelAnimationFrame(rafMic);
  if(audioCtx){ audioCtx.close(); audioCtx=null; }
  if(mediaStream){ mediaStream.getTracks().forEach(t=>t.stop()); mediaStream=null; }
  document.getElementById('camVideo').srcObject=null;
  document.getElementById('camPreview').style.display='none';
}

/* ── Firebase: Auth + Firestore + Storage ──
   Lim inn web-config i APP_CONFIG.firebase. Uten nøkler: lokal demo.
   Datamodell (klar for deling/abonnement senere):
     users/{uid}/apps/{appId}  = { folderState, trip, updatedAt }
   Neste lag: trips/{tripId} med { ownerUid, members:{uid:rolle} } for invitasjoner. */
let fb=null, auth=null, db=null, storage=null, fbUser=null, suppressSave=false, saveTimer=null;
function initFirebase(){
  if(!APP_CONFIG.firebase.apiKey || typeof firebase==='undefined') return; // lokal demo
  try{
    fb=firebase.initializeApp(APP_CONFIG.firebase);
    auth=firebase.auth();
    db=firebase.firestore();
    try{ storage=firebase.storage(); }catch(e){ console.warn('Storage utilgjengelig',e); }
    auth.onAuthStateChanged(async u=>{
      fbUser=u;
      document.getElementById('authStatus').textContent =
        u ? (I18N[LANG].auth_in+': '+(u.displayName||u.email||'')) : I18N[LANG].auth_demo;
      document.getElementById('authBtn').textContent =
        u ? I18N[LANG].sign_out : I18N[LANG].sign_in;
      if(u) await loadState();
    });
  }catch(e){ console.warn('Firebase init feilet — lokal demo.', e); }
}
function userDoc(){ return db.collection('users').doc(fbUser.uid).collection('apps').doc(APP_CONFIG.id); }
async function loadState(){
  try{
    const snap=await userDoc().get();
    if(snap.exists && snap.data().folderState){
      suppressSave=true;
      const saved=snap.data().folderState;
      Object.keys(saved).forEach(k=>{ folderState[k]=saved[k]; });
      suppressSave=false;
      if(document.getElementById('folderview').classList.contains('show')) renderFolderView();
      else if(document.getElementById('detail').classList.contains('show')) renderFolders();
    }else{
      saveState(); // første innlogging: lagre seed-data
    }
  }catch(e){ console.warn('Kunne ikke laste lagret tilstand.',e); }
}
function saveState(){
  if(!db || !fbUser || suppressSave) return;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    userDoc().set({
      folderState: folderState,
      trip:{ name:document.getElementById('tripName').textContent, start:document.getElementById('tripStart').textContent },
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true}).catch(e=>console.warn('Lagring feilet',e));
  },900);
}
function toggleAuth(){
  if(!auth){ alert(LANG==='no'
      ? 'Firebase ikke konfigurert ennå. Lim inn web-config i APP_CONFIG.firebase, og legg appens URL under Authentication → Authorized Domains.'
      : 'Firebase not configured yet.'); return; }
  if(auth.currentUser){ auth.signOut(); return; }
  const p=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(p).catch(e=>{
    if(['auth/popup-blocked','auth/cancelled-popup-request','auth/operation-not-supported-in-this-environment'].includes(e.code))
      auth.signInWithRedirect(p);
    else alert(e.message);
  });
}

/* ── stjernebakgrunn (Rom) ── */
function drawStars(){
  const c=document.getElementById('stars'); if(!c) return;
  const ctx=c.getContext('2d'), dpr=window.devicePixelRatio||1;
  function size(){ c.width=innerWidth*dpr; c.height=innerHeight*dpr; draw(); }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    for(let i=0;i<140;i++){
      const x=Math.random()*c.width, y=Math.random()*c.height, r=Math.random()*1.4*dpr;
      ctx.globalAlpha=Math.random()*0.7+0.2; ctx.fillStyle='#cfe3ff';
      ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  addEventListener('resize',size); size();
}
